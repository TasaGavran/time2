<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Time Caffe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="admin-login-page">
        <div class="admin-login-card">
            <h2 style="font-family:var(--heading);font-size:1.8rem">Time <span style="color:var(--gold);font-style:italic;font-weight:500">Caffe</span></h2>
            <p class="subtitle">Admin Panel</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-error">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="fg">
                    <label>Korisničko ime</label>
                    <input type="text" name="username" class="fc" placeholder="admin" required autofocus>
                </div>
                <div class="fg">
                    <label>Lozinka</label>
                    <input type="password" name="password" class="fc" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn btn-gold" style="width:100%">Prijavite se</button>
            </form>

            <p style="margin-top:24px;font-size:.85rem">
                <a href="{{ url_for('index') }}">&larr; Nazad na sajt</a>
            </p>
        </div>
    </div>
</body>
</html>
